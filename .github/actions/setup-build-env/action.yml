name: 'Setup Build Environment'
description: 'Setup Python, Rust, and build tools with caching'
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  rust-toolchain:
    description: 'Rust toolchain to use'
    required: false
    default: 'stable'
  install-cargo-tools:
    description: 'Whether to install cargo tools'
    required: false
    default: 'false'
  install-python-deps:
    description: 'Whether to install Python build dependencies'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: rustfmt, clippy, llvm-tools-preview

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ inputs.rust-toolchain }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.rust-toolchain }}-
          ${{ runner.os }}-cargo-
    - uses: cargo-bins/cargo-binstall@main
    - name: Install cargo tools
      if: inputs.install-cargo-tools == 'true'
      shell: bash
      run: |
        test -e ~/.cargo/bin/cargo-nextest || cargo binstall cargo-nextest --secure
        test -e ~/.cargo/bin/cargo-llvm-cov || cargo install cargo-llvm-cov

    - name: Create and activate virtual environment
      if: inputs.install-python-deps == 'true'
      shell: bash
      run: |
        python -m venv .venv
        echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
        echo "$PWD/.venv/bin" >> $GITHUB_PATH

    - name: Install Python Build Dependencies
      if: inputs.install-python-deps == 'true'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install maturin pytest pytest-asyncio pytest-cov coverage ruff
