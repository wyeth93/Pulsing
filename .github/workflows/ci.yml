name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust 检查和测试
  rust:
    name: Rust ${{ matrix.rust }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          rust-toolchain: ${{ matrix.rust }}
          install-cargo-tools: 'false'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude pulsing-py --exclude pulsing-bench-py --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude pulsing-py --exclude pulsing-bench-py --all-targets

      - name: Test
        run: cargo test --workspace --exclude pulsing-py --exclude pulsing-bench-py --all-targets

  # Rust 测试 + 覆盖率收集 (仅 Linux)
  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          rust-toolchain: stable
          install-cargo-tools: 'true'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests and collect coverage
        shell: bash
        run: |
          source <(cargo llvm-cov show-env --export-prefix)
          export CARGO_TARGET_DIR=$CARGO_LLVM_COV_TARGET_DIR
          export CARGO_INCREMENTAL=1
          cargo llvm-cov clean --workspace
          cargo nextest run --workspace --exclude pulsing-py --exclude pulsing-bench-py
          cargo llvm-cov --no-run --lcov --output-path coverage.lcov

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.lcov
          retention-days: 30

  # Python 检查和测试
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: ${{ matrix.python-version }}
          install-python-deps: 'true'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Python package
        run: maturin develop

      - name: Lint with ruff
        run: ruff check python/

      - name: Test with pytest
        run: pytest tests/python -v

  # Python 测试 + 覆盖率收集
  python-coverage:
    name: Python Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: '3.12'
          install-python-deps: 'true'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Python package
        run: maturin develop

      - name: Run Python tests and collect coverage
        run: |
          pytest tests/python --cov=python/pulsing --cov-report=xml:coverage.xml -v

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

  # 上传覆盖率到 Codecov
  codecov:
    name: Upload Coverage to Codecov
    needs: [rust-coverage, python-coverage]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download Rust coverage report
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: .
        continue-on-error: true

      - name: Download Python coverage report
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: .
        continue-on-error: true

      - name: Check coverage files exist
        run: |
          echo "=== Coverage files check ==="
          if [ -f coverage.lcov ]; then
            echo "✓ coverage.lcov exists ($(wc -l < coverage.lcov) lines)"
          else
            echo "✗ coverage.lcov not found"
          fi
          if [ -f coverage.xml ]; then
            echo "✓ coverage.xml exists ($(wc -l < coverage.xml) lines)"
          else
            echo "✗ coverage.xml not found"
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov,coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Pre-commit 检查
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  # 构建检查
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: '3.12'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          sccache: 'true'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
