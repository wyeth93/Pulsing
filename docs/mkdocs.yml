site_name: Pulsing
site_description: A lightweight distributed Actor framework for building scalable systems
site_url: https://github.com/reiase/pulsing
docs_dir: src

repo_name: reiase/pulsing
repo_url: https://github.com/reiase/pulsing

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    # - navigation.instant  # Disabled due to conflict with i18n plugin
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: "Pulsing Documentation"
        - locale: zh
          name: 中文
          build: true
          site_name: "Pulsing 文档"
          nav_translations:
            Home: 首页
            Installation: 安装指南
            Getting Started: 入门指南
            Quick Start: 快速参考
            Guide: 用户指南
            Actors: Actor 完整指南
            Architecture: 架构
            Distributed Queue: 分布式内存队列
            Semantics: 语义与保证
            Actor System: Actor 系统
            Remote Actors: 远程 Actor
            Examples: 示例
            Ping-Pong: Ping-Pong
            Distributed Counter: 分布式计数器
            LLM Inference: LLM 推理
            Design: 设计文档
            Node Discovery: 节点发现
            Actor Addressing: Actor 寻址
            HTTP2 Transport: HTTP2 传输
            Load Sync: 负载同步
            AS Actor Decorator: AS Actor 装饰器
            API Reference: API 参考
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_options:
              ignore_init_summary: yes
            merge_init_into_class: yes
            show_submodules: no

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting_started.md
  - Quick Start: quickstart/index.md
  - Guide:
    - guide/index.md
    - Actors: guide/actors.md
    - Architecture: guide/architecture.md
    - Distributed Queue: guide/queue.md
    - Semantics: guide/semantics.md
    - Actor System: guide/actor_system.md
    - Remote Actors: guide/remote_actors.md
  - Examples:
    - examples/index.md
    - Ping-Pong: examples/ping_pong.md
    - Distributed Counter: examples/distributed_counter.md
    - LLM Inference: examples/llm_inference.md
  - Design:
    - Actor System: design/actor-system.md
    - Node Discovery: design/node-discovery.md
    - Actor Addressing: design/actor-addressing.md
    - HTTP2 Transport: design/http2-transport.md
    - Load Sync: design/load_sync.md
    - AS Actor Decorator: design/as-actor-decorator.md
  - API Reference: api_reference.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/reiase/pulsing

extra_css:
  - assets/stylesheets/home.css

copyright: © 2025 Pulsing. All rights reserved.
