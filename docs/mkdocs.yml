site_name: Pulsing
site_description: A lightweight distributed Actor framework for building scalable systems
# Docs may be hosted elsewhere, but repo is the canonical entry point.
site_url: https://github.com/reiase/pulsing
docs_dir: src

repo_name: reiase/pulsing
repo_url: https://github.com/reiase/pulsing

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    # - navigation.instant  # Disabled due to conflict with i18n plugin
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: "Pulsing Documentation"
        - locale: zh
          name: 中文
          build: true
          site_name: "Pulsing 文档"
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            LLM Inference: LLM 推理
            Distributed Agents: 分布式 Agent
            Migrate from Ray: 从 Ray 迁移
            Guide: 用户指南
            Actors: Actor 指南
            Remote Actors: 远程 Actor
            Security: 安全
            Reliability: 可靠性
            Operations: CLI 运维
            Distributed Queue: 分布式内存队列
            Semantics: 语义与保证
            Agent: Agent 框架
            Overview: 概述
            AutoGen: AutoGen
            LangGraph: LangGraph
            Examples: 示例
            Ping-Pong: Ping-Pong
            Distributed Counter: 分布式计数器
            Design: 设计文档
            Architecture: 架构概览
            Actor System: Actor 系统
            Node Discovery: 节点发现
            Actor Addressing: Actor 寻址
            HTTP2 Transport: HTTP2 传输
            Load Sync: 负载同步
            AS Actor Decorator: AS Actor 装饰器
            API Reference: API 参考
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_options:
              ignore_init_summary: yes
            merge_init_into_class: yes
            show_submodules: no

nav:
  - Home: index.md
  - Getting Started:
    - quickstart/index.md
    - LLM Inference: quickstart/llm_inference.md
    - Distributed Agents: quickstart/agent.md
    - Migrate from Ray: quickstart/migrate_from_ray.md
  - Guide:
    - guide/index.md
    - Actors: guide/actors.md
    - Remote Actors: guide/remote_actors.md
    - Operations: guide/operations.md
    - Reliability: guide/reliability.md
    - Security: guide/security.md
    - Distributed Queue: guide/queue.md
    - Semantics: guide/semantics.md
  - Agent:
    - agent/index.md
    - AutoGen: agent/autogen.md
    - LangGraph: agent/langgraph.md
  - Examples:
    - examples/index.md
    - Ping-Pong: examples/ping_pong.md
    - Distributed Counter: examples/distributed_counter.md
  - Design:
    - Architecture: design/architecture.md
    - Actor System: design/actor-system.md
    - Node Discovery: design/node-discovery.md
    - Actor Addressing: design/actor-addressing.md
    - HTTP2 Transport: design/http2-transport.md
    - Load Sync: design/load_sync.md
    - AS Actor Decorator: design/as-actor-decorator.md
  - API Reference: api_reference.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/reiase/pulsing

extra_css:
  - assets/stylesheets/home.css

copyright: © 2026 Pulsing. All rights reserved.
