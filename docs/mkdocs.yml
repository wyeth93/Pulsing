site_name: Pulsing
site_description: "Pulsing: Backbone for distributed AI systems. Actor runtime. Streaming-first. Zero dependencies. Built-in discovery."
# Docs may be hosted elsewhere, but repo is the canonical entry point.
site_url: https://github.com/DeepLink-org/pulsing
docs_dir: src

repo_name: DeepLink-org/pulsing
repo_url: https://github.com/DeepLink-org/pulsing

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    # - navigation.instant  # Disabled due to conflict with i18n plugin
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: "Pulsing Documentation"
        - locale: zh
          name: 中文
          build: true
          site_name: "Pulsing 文档"
          nav_translations:
            Home: 首页
            Overview: 概述
            Quick Start: 快速开始
            First Actor: 第一个 Actor
            Actor Patterns: Actor 模式
            Cluster Setup: 集群组网
            Get Started: 入门
            Getting Started: 开始使用
            Core Concepts: 核心概念
            Architecture Overview: 架构概览
            Cluster & Network: 集群与网络
            Implementation: 实现细节
            User Guides: 用户指南
            Architecture & Design: 架构与设计
            Complete Reference: 完整参考
            LLM Inference: LLM 推理
            Distributed Agents: 分布式 Agent
            Ray + Pulsing: Ray + Pulsing
            User Guide: 用户指南
            Guide: 指南
            Actors: Actor 指南
            Communication Patterns: 通信范式
            Remote Actors: 远程 Actor
            Operations: CLI 运维
            Reliability: 可靠性
            Security: 安全
            Distributed Queue: 分布式队列
            Semantics: 语义与保证
            Style Guide: 术语与风格
            Agent Framework: Agent 框架
            Examples: 示例
            Ping-Pong: Ping-Pong
            Distributed Counter: 分布式计数器
            API Reference: API 参考
            API Overview: API 概述
            Python: Python API
            Rust: Rust API
            FAQ: 常见问题
            Design: 设计文档
            Actor Basics: Actor 基础
            Architecture: 架构概览
            Actor System: Actor 系统
            Behavior API: Behavior API
            Node Discovery: 节点发现
            Cluster Networking: 集群组网
            Actor Addressing: Actor 寻址
            HTTP2 Transport: HTTP2 传输
            Load Sync: 负载同步
            AS Actor Decorator: AS Actor 装饰器
            Communication Evolution: 集群内通信技术演进
  - mkdocstrings:
      handlers:
        python:
          paths: ["../python"]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: yes
            merge_init_into_class: yes
            show_submodules: no
            show_category_heading: yes
            show_labels: yes
            show_symbol_type_heading: yes
            show_symbol_type_toc: yes

nav:
  - Home: index.md
  - Overview: overview.md
  - Quick Start:
    - First Actor: quickstart/index.md
    - Actor Patterns: quickstart/patterns.md
    - Cluster Setup: quickstart/cluster_networking.md
    - LLM Inference: quickstart/llm_inference.md
    - Distributed Agents: quickstart/agent.md
    - Ray + Pulsing: quickstart/migrate_from_ray.md
  - Core Concepts:
    - Actor Basics: guide/actors.md
    - Communication Patterns: guide/communication_patterns.md
    - Remote Actors: guide/remote_actors.md
    - Reliability: guide/reliability.md
  - User Guides:
    - Operations: guide/operations.md
    - Security: guide/security.md
    - Distributed Queue: guide/queue.md
    - Semantics: guide/semantics.md
    - Style Guide: guide/style.md
    - Agent Framework:
      - Overview: agent/index.md
      - Pulsing Native: agent/native.md
      - AutoGen: agent/autogen.md
      - LangGraph: agent/langgraph.md
    - Examples:
      - Overview: examples/index.md
      - Ping-Pong: examples/ping_pong.md
      - Distributed Counter: examples/distributed_counter.md
  - API Reference:
    - API Overview: api/overview.md
    - Complete Reference: api_reference.md
    - Python: api/python.md
    - Rust: api/rust.md
  - FAQ: faq.md
  - Architecture & Design:
    - Architecture Overview: design/architecture.md
    - Actor System:
      - Actor System: design/actor-system.md
      - Behavior API: design/behavior.md
    - Cluster & Network:
      - Cluster Networking: design/cluster-networking.md
      - Node Discovery: design/node-discovery.md
      - HTTP2 Transport: design/http2-transport.md
      - Actor Addressing: design/actor-addressing.md
      - Load Sync: design/load_sync.md
    - Implementation:
      - AS Actor Decorator: design/as-actor-decorator.md
      - Communication Evolution: design/cluster-communication-evolution.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DeepLink-org/Pulsing

extra_css:
  - assets/stylesheets/home.css

